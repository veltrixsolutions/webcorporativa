<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Proyecto Corporativo</title>
    <link rel="stylesheet" href="static/css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1>Iniciar Sesión</h1>
            <div id="alert-box" class="alert hidden"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" name="usuario" required autocomplete="off" placeholder="Ingresa tu usuario">
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required placeholder="Ingresa tu contraseña">
                </div>

                <div class="form-group captcha-group">
                    <label>Resuelve la operación para continuar:</label>
                    <div class="captcha-box">
                        <span id="captcha-question"></span>
                        <input type="number" id="captcha-answer" required placeholder="Resultado">
                    </div>
                </div>

                <button type="submit" class="btn-submit">Ingresar</button>
            </form>
        </div>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
