<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veltrix - Acceso Corporativo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/login.css?v=2">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="login-container">
        <div class="login-card">
            <h1 id="titulo-login">Iniciar Sesión</h1>
            <p id="subtitulo-login" class="login-subtitle">Ingresa tus credenciales corporativas</p>
            
            <div id="alert-box" class="alert hidden"></div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="usuario">Usuario</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text" id="usuario" name="usuario" required autocomplete="off" placeholder="Ej. admin o jperez">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="password" name="password" required placeholder="••••••••">
                    </div>
                </div>

                <div class="form-group recaptcha-wrapper">
                    <div class="g-recaptcha" data-sitekey="6LeWXHssAAAAAMk9rr9nZDOsBOq0iRzgleqLh-QK"></div>
                </div>

                <button type="submit" class="btn-submit">
                    <span>Ingresar al Sistema</span> <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <form id="change-pwd-form" style="display: none;">
                <div class="security-notice">
                    <i class="fas fa-shield-alt notice-icon"></i>
                    <p>Por razones de seguridad, debes establecer una <b>contraseña definitiva</b> antes de acceder al sistema.</p>
                </div>
                
                <div class="form-group">
                    <label for="new-pwd">Nueva Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fas fa-key input-icon"></i>
                        <input type="password" id="new-pwd" required placeholder="Mínimo 6 caracteres">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="confirm-pwd">Confirmar Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fas fa-check-double input-icon"></i>
                        <input type="password" id="confirm-pwd" required placeholder="Repite la nueva contraseña">
                    </div>
                </div>

                <button type="submit" class="btn-submit btn-success">
                    <i class="fas fa-save"></i> <span>Actualizar y Entrar</span>
                </button>
                <button type="button" id="btn-cancel-change" class="btn-cancel">Volver al inicio</button>
            </form>
        </div>
        
        <div class="login-footer">
            &copy; 2026 Veltrix Solutions. Acceso restringido.
        </div>
    </div>
    
    <script src="js/login.js?v=2"></script>
</body>
</html>
