<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error del Servidor - Veltrix Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* --- DECORACIONES DE FONDO --- */
        .bg-shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
            animation: float 10s infinite ease-in-out alternate;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            background: #bfdbfe; 
            top: -100px;
            left: -100px;
        }

        .shape-2 {
            width: 500px;
            height: 500px;
            background: #fbcfe8; 
            bottom: -150px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(30px) scale(1.05); }
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .error-container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            z-index: 10;
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- TARJETA DE ERROR --- */
        .error-card {
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05);
            border: 1px solid #f1f5f9;
            text-align: center;
        }

        /* --- ICONO ANIMADO --- */
        .icon-container {
            width: 90px;
            height: 90px;
            background: #fef2f2;
            color: #ef4444;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 25px;
            box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.1);
            animation: pulseWarning 2s infinite;
        }

        @keyframes pulseWarning {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.2); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        /* --- TEXTOS --- */
        h1 {
            font-size: 1.8rem;
            color: #0f172a;
            margin-bottom: 15px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        p {
            color: #64748b;
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .error-code {
            display: inline-block;
            background: #f1f5f9;
            color: #475569;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 25px;
            border: 1px solid #e2e8f0;
        }

        /* --- BOTONES --- */
        .btn-primary {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            background-color: #2563eb;
            color: white;
            font-size: 1.05rem;
            font-weight: 600;
            padding: 15px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .btn-primary:hover {
            background-color: #1d4ed8;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
            transform: translateY(-2px);
        }

        @media (max-width: 480px) {
            .error-card { padding: 40px 25px; }
            h1 { font-size: 1.5rem; }
            .icon-container { width: 75px; height: 75px; font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="error-container">
        <div class="error-card">
            <div class="icon-container">
                <i class="fas fa-server"></i>
            </div>
            
            <div class="error-code">ERROR 500</div>
            
            <h1>Ups... Algo falló en el servidor</h1>
            <p>Ocurrió un problema inesperado al procesar tu solicitud. Nuestro equipo técnico ha sido notificado y está trabajando en ello.</p>
            
            <a href="#" id="btn-smart-redirect" class="btn-primary" style="display: none;">
                </a>
            
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const btnRedirect = document.getElementById('btn-smart-redirect');
            const jwtToken = localStorage.getItem('jwt_token');

            if (jwtToken) {
                // Usuario autenticado
                btnRedirect.href = '/dashboard.html'; 
                btnRedirect.innerHTML = '<i class="fas fa-home"></i> Volver al Inicio';
            } else {
                // Usuario no autenticado
                btnRedirect.href = '/login.html'; 
                btnRedirect.innerHTML = '<i class="fas fa-sign-in-alt"></i> Ir a Iniciar Sesión';
                btnRedirect.style.backgroundColor = '#0f172a'; // Tono oscuro para diferenciarlo del flujo normal
                btnRedirect.style.boxShadow = '0 4px 6px -1px rgba(15, 23, 42, 0.2)';
            }

            btnRedirect.style.display = 'flex';
        });
    </script>
</body>
</html>
