<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Veltrix Solutions</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
                <h2 style="font-size: 1.3rem; margin: 0;">Veltrix</h2>
                <button id="btn-close-sidebar" class="btn-close-sidebar">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="user-profile">
                <img id="user-avatar" src="" alt="Avatar" class="avatar">
                <span id="user-name">Cargando...</span>
            </div>
            
            <nav id="dynamic-menu" class="sidebar-menu">
                </nav>
        </aside>

        <main class="main-content">
            <header class="topbar">
                
                <div style="display: flex; align-items: center;">
                    <button id="mobile-menu-btn" class="mobile-menu-btn">
                        <i class="fas fa-bars"></i>
                    </button>

                    <div id="breadcrumbs" class="breadcrumbs">
                        <span class="crumb clickable" id="crumb-inicio" title="Volver al inicio">Inicio</span>
                    </div>
                </div>
                
                <div style="display: flex; align-items: center; gap: 24px;">
                    <div class="theme-switch-wrapper">
                        <i class="fas fa-sun sun-icon"></i>
                        <label class="theme-switch" for="checkbox">
                            <input type="checkbox" id="checkbox" />
                            <div class="slider round"></div>
                        </label>
                        <i class="fas fa-moon moon-icon"></i>
                    </div>
                    
                    <button id="btn-logout" class="btn-logout">
                        <i class="fas fa-sign-out-alt"></i> <span>Cerrar Sesión</span>
                    </button>
                </div>
            </header>
            
            <div class="content-scroll-area">
                <div id="module-content" class="module-container">
                    <div class="data-card-centered">
                        <h1>Bienvenido al Sistema</h1>
                        <p>Selecciona un módulo en el menú lateral para comenzar a gestionar los datos corporativos.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/usuario.js?v=3"></script>
    <script src="js/perfil.js?v=3"></script>
    <script src="js/permiso.js?v=3"></script>
    <script src="js/modulo.js?v=3"></script>
    <script src="js/estatico.js?v=3"></script>
    <script src="js/app.js?v=3"></script>
</body>
</html>
