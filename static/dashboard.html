<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Veltrix Solutions</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Veltrix Solutions</h2>
            </div>
            <div class="user-profile">
                <img id="user-avatar" src="" alt="Avatar" class="avatar">
                <span id="user-name">Cargando...</span>
            </div>
            <nav id="dynamic-menu" class="sidebar-menu">
            </nav>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div id="breadcrumbs" class="breadcrumbs">
                    <span class="crumb">Inicio</span>
                </div>
                
                <div style="display: flex; align-items: center; gap: 15px;">
                    <button id="btn-theme-toggle" style="background: transparent; border: none; color: var(--text-color, #64748b); font-size: 1.2rem; cursor: pointer; transition: color 0.2s;" title="Cambiar tema">
                        <i class="fas fa-moon"></i>
                    </button>
                    
                    <button id="btn-logout" class="btn-logout">
                        <i class="fas fa-sign-out-alt"></i> Cerrar Sesión
                    </button>
                </div>
            </header>
            
            <div class="content-scroll-area">
                <div id="module-content" class="module-container">
                    <div class="data-card-centered">
                        <h1>Bienvenido al Sistema</h1>
                        <p>Selecciona un módulo en el menú lateral para comenzar a gestionar los datos corporativos.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeToggleBtn = document.getElementById('btn-theme-toggle');
            const themeIcon = themeToggleBtn.querySelector('i');
            
            // 1. Revisar si hay un tema guardado previamente, si no, por defecto 'light'
            const currentTheme = localStorage.getItem('veltrix_theme') || 'light';
            
            // 2. Aplicar el tema al HTML principal
            document.documentElement.setAttribute('data-theme', currentTheme);
            actualizarIcono(currentTheme);

            // 3. Evento al hacer clic en el botón
            themeToggleBtn.addEventListener('click', () => {
                let theme = document.documentElement.getAttribute('data-theme');
                let newTheme = theme === 'dark' ? 'light' : 'dark';
                
                document.documentElement.setAttribute('data-theme', newTheme);
                localStorage.setItem('veltrix_theme', newTheme); // Guardar preferencia
                actualizarIcono(newTheme);
            });

            // Cambiar icono sol/luna
            function actualizarIcono(theme) {
                if (theme === 'dark') {
                    themeIcon.classList.replace('fa-moon', 'fa-sun');
                } else {
                    themeIcon.classList.replace('fa-sun', 'fa-moon');
                }
            }
        });
    </script>

    <script src="js/usuario.js?v=2"></script>
    <script src="js/perfil.js?v=2"></script>
    <script src="js/permiso.js?v=2"></script>
    <script src="js/modulo.js?v=2"></script>
    <script src="js/estatico.js?v=2"></script>
    <script src="js/app.js?v=2"></script>
</body>
</html>
