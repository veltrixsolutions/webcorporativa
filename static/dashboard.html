<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Veltrix Solutions</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Veltrix Solutions</h2>
            </div>
            <div class="user-profile">
                <img id="user-avatar" src="" alt="Avatar" class="avatar">
                <span id="user-name">Cargando...</span>
            </div>
            <nav id="dynamic-menu" class="sidebar-menu"></nav>
        </aside>

        <main class="main-content">
            <header class="topbar">
                <div id="breadcrumbs" class="breadcrumbs">
                    <span class="crumb">Inicio</span>
                </div>
                
                <div style="display: flex; align-items: center; gap: 20px;">
                    <div class="theme-switch-wrapper">
                        <i class="fas fa-sun sun-icon"></i>
                        <label class="theme-switch" for="checkbox">
                            <input type="checkbox" id="checkbox" />
                            <div class="slider round"></div>
                        </label>
                        <i class="fas fa-moon moon-icon"></i>
                    </div>

                    <button id="btn-logout" class="btn-logout">
                        <i class="fas fa-sign-out-alt"></i> <span>Cerrar Sesión</span>
                    </button>
                </div>
            </header>
            
            <div class="content-scroll-area">
                <div id="module-content" class="module-container">
                    <div class="data-card-centered">
                        <h1>Bienvenido al Sistema</h1>
                        <p>Selecciona un módulo en el menú lateral para comenzar a gestionar los datos corporativos.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggleSwitch = document.querySelector('.theme-switch input[type="checkbox"]');
            const currentTheme = localStorage.getItem('veltrix_theme') || 'light';

            // Aplicar tema inicial
            if (currentTheme === 'dark') {
                toggleSwitch.checked = true;
                document.documentElement.setAttribute('data-theme', 'dark');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
            }

            // Escuchar cambios en el switch
            toggleSwitch.addEventListener('change', (e) => {
                if (e.target.checked) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    localStorage.setItem('veltrix_theme', 'dark');
                } else {
                    document.documentElement.setAttribute('data-theme', 'light');
                    localStorage.setItem('veltrix_theme', 'light');
                }
            });
        });
    </script>

    <script src="js/usuario.js?v=2"></script>
    <script src="js/perfil.js?v=2"></script>
    <script src="js/permiso.js?v=2"></script>
    <script src="js/modulo.js?v=2"></script>
    <script src="js/estatico.js?v=2"></script>
    <script src="js/app.js?v=2"></script>
</body>
</html>
